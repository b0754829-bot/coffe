<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#2c1a11">
    <meta name="apple-mobile-web-app-title" content="كافيه حكاية">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-status-bar-style" content="#06b6d4">
<meta name="theme-color" content="#06b6d4">

    <title>كافيه حكاية للقهوة المختصة | بداية كل حكاية فنجان قهوة</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
   <style>
        :root {
            /* 🪙 لوحة ألوان الأحادية الفخمة (التيتانيوم، الفضي، والأسود العميق) */
            --primary-solid: #0b3f3b;       /* لون التميز الخاص بك: الزمردي البترولي العتيق */
            --black-premium: #0c0d0e;       /* الأسود الفخم والعميق جداً للنصوص الرئيسية */
            --titanium-natural: #ecefed;    /* التيتانيوم الطبيعي النقي والمريح جداً كخلفية للموقع */
            --silver-metallic: #cbd5e1;     /* الفضي المعدني الفاخر للحدود واللمعان الخفيف */
            --text-gray: #475569;           /* الرمادي الأنيق المعتمد للنصوص الثانوية والمواصفات */
            
            /* 💎 الهوية الزجاجية المعدنية والجزيرة الديناميكية */
            --glass-bg: rgba(255, 255, 255, 0.7); /* زجاجي تيتانيوم ناعم يمرر الإضاءة */
            --glass-border: rgba(255, 255, 255, 0.8);
            --card-shadow: 0 10px 35px rgba(12, 13, 14, 0.03), inset 0 1px 2px rgba(255, 255, 255, 0.8);
            --radius-premium: 28px;         /* انحناءات فائقة النعومة وودودة جداً للهواتف */
            --transition-smooth: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); /* محرك النعومة الفائقة */
        }

        * {
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* 🌌 خلفية الموقع: انسيابية، هادئة، ومريحة للعين */
        body {
            background-color: var(--titanium-natural) !important;
            margin: 0; padding: 0;
            overflow-x: hidden;
            position: relative;
            min-height: 100vh;
            color: var(--black-premium) !important;
            scroll-behavior: smooth;
        }

        /* 🧬 شبكة ظلال خفيفة ناعمة تسبح في الخلفية لتعطي عمقاً حيادياً */
        .futuristic-bg-glow {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1; 
            overflow: hidden;
            background: linear-gradient(180deg, #f3f6f5 0%, #ecefed 100%);
        }

        /* 💎 البطاقات والكروت بنظام الحواف الناعمة الودودة والتكبير الذكي للمحتوى */
        .premium-product-card, .category-card, .offer-card, .glass-premium-card {
            background: var(--glass-bg) !important;
            backdrop-filter: blur(20px) saturate(140%) !important;
            -webkit-backdrop-filter: blur(20px) saturate(140%) !important;
            border: 1px solid var(--glass-border) !important;
            box-shadow: var(--card-shadow) !important;
            border-radius: var(--radius-premium) !important;
            color: var(--black-premium) !important;
            transition: var(--transition-smooth) !important;
            overflow: hidden; /* لضمان عدم خروج الصورة أثناء التكبير الناعم */
        }

        .premium-product-card h4, .category-card h3, .offer-details h3, .glass-premium-card h3 {
            color: var(--black-premium) !important;
            font-weight: 800;
        }

        /* 🎬 تأثير التمرير الذكي الفخم (تتكبر الصورة بنعومة فائقة في مكانها) */
        .premium-product-card img {
            width: 100% !important; height: 190px !important; object-fit: cover !important;
            border-radius: calc(var(--radius-premium) - 10px); margin-bottom: 12px;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1) !important; /* نعومة حركة الصورة */
        }

        .premium-product-card:hover img {
            transform: scale(1.06); /* تكبير الصورة بلطف فائق */
        }

        .premium-product-card:hover {
            transform: translateY(-4px) !important;
            background: rgba(255, 255, 255, 0.9) !important;
            box-shadow: 0 20px 40px rgba(12, 13, 14, 0.05) !important;
        }

        /* 🎛️ الأزرار شبه اللامعة ذات اللون القوي والمميز (الاستجابة التفاعلية الذكية) */
        .cart-trigger, .premium-load-more-btn, .filter-btn, .category-toggle-btn,
        .checkout-btn, .continue-shopping-btn, .phone-call-btn-link, .waze-premium-btn,
        .working-hours-capsule {
            background: var(--primary-solid) !important; /* لون التميز القوي الواضح جداً */
            color: white !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            box-shadow: 0 4px 15px rgba(11, 63, 59, 0.2), inset 0 1px 2px rgba(255, 255, 255, 0.25) !important;
            border-radius: 40px !important; 
            font-weight: 800;
            position: relative; overflow: hidden;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1; cursor: pointer; text-decoration: none;
            display: inline-flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* لمعان شبه معدني يمر بسرعة على الزر ليلفت الانتباه فورا */
        .cart-trigger::after, .premium-load-more-btn::after, .filter-btn::after, .category-toggle-btn::after,
        .checkout-btn::after, .continue-shopping-btn::after, .phone-call-btn-link::after, .waze-premium-btn::after {
            content: ''; position: absolute;
            top: 0; left: -150%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg); transition: all 0.7s ease; z-index: -1;
        }

        /* 📱 حركة الضغط والارتداد السريع عند النقر (Micro-interaction) */
        .cart-trigger:active, .premium-load-more-btn:active, .filter-btn:active, .category-toggle-btn:active,
        .checkout-btn:active, .continue-shopping-btn:active, .phone-call-btn-link:active, .waze-premium-btn:active,
        .circle-add-btn:active {
            transform: scale(0.94) !important; /* يتقلص الزر برقة ليوحي بالضغط الميكانيكي */
            opacity: 0.9;
        }

        .cart-trigger:hover, .premium-load-more-btn:hover, .filter-btn:hover:not(.active), .category-toggle-btn:hover,
        .continue-shopping-btn:hover, .phone-call-btn-link:hover, .waze-premium-btn:hover {
            box-shadow: 0 8px 25px rgba(11, 63, 59, 0.35) !important;
            background: #0f4f4a !important; /* تفتيح بسيط جداً عند تمرير الماوس للتفاعل */
        }

        .cart-trigger:hover::after, .premium-load-more-btn:hover::after, .filter-btn:hover::after, .category-toggle-btn:hover::after,
        .checkout-btn:hover::after, .continue-shopping-btn:hover::after, .phone-call-btn-link:hover::after, .waze-premium-btn:hover::after {
            left: 150%;
        }

        /* الأزرار غير النشطة الفاخرة لتعكس طابع التيتانيوم الهادئ */
        .filter-btn {
            background: rgba(255, 255, 255, 0.8) !important;
            color: var(--black-premium) !important;
            border: 1px solid var(--silver-metallic) !important;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02) !important;
        }
        .filter-btn.active {
            background: var(--primary-solid) !important;
            color: white !important;
        }

       /* 1. نقوم أولاً بتجهيز الكارت ليحتوي الزر بشكل مطلق */
.premium-product-card {
    position: relative !important; /* هذا السطر إلزامي */
}

/* 2. إعادة تموضع الزر فوق زاوية الصورة مباشرة */
.circle-add-btn {
    position: absolute !important;
    top: 24px;   /* مسافة ثابتة من الأعلى */
    left: 24px;  /* مسافة ثابتة من اليسار ليصبح في الزاوية */
    z-index: 10; /* ليبقى طافياً فوق الصورة */
    
    /* بقية خصائص اللون الفخم والتحجيم التي اعتمدناها سابقاً */
    background: var(--primary-solid) !important;
    color: white !important;
    border: none !important;
    width: 42px; height: 42px; border-radius: 50%;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(11, 63, 59, 0.25) !important;
    transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; align-items: center; justify-content: center; cursor: pointer;
}

.circle-add-btn:hover {
    transform: scale(1.08) rotate(90deg) !important;
    background: #0f4f4a !important;
}

        .circle-add-btn:hover {
            transform: scale(1.08) rotate(90deg);
            background: #0f4f4a !important;
            box-shadow: 0 8px 22px rgba(11, 63, 59, 0.4) !important;
        }

        /* 🏝️ الهيدر بنمط "الجزيرة الديناميكية" النحيفة والذكية المعلقة (Dynamic Island Header) */
        .custom-premium-header {
            position: fixed;
            top: 12px; left: 5% !important;
            width: 90% !important; min-width: 90vw !important; height: 60px; /* نحيف جداً وذكي */
            z-index: 9999; display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; box-sizing: border-box;
            
            /* تصميم الجزيرة الطافية المعزولة زجاجياً بفخامة */
            background: rgba(12, 13, 14, 0.88) !important; /* تيتانيوم أسود فخم مائل للشفافية */
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.08) !important;
            border-radius: 50px !important; /* حواف دائرية كاملة كالجزيرة الذكية */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
            transition: var(--transition-smooth);
        }

        /* 🎛️ أزرار المنيو الثلاث المحدثة (واضحة، قوية وشبه لامعة) */
        .menu-trigger-btn {
            display: flex; flex-direction: column; gap: 5px;
            cursor: pointer; padding: 10px; border-radius: 50%;
            background: rgba(255, 255, 255, 0.08); /* كبسولة تيتانيوم حول الزر لبروزه */
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        
        .menu-trigger-btn:hover {
            background: rgba(255, 255, 255, 0.18);
        }

        .menu-trigger-btn .bar {
            width: 22px; height: 2.5px;
            background-color: white !important; /* لون فضي ناصع وواضح جداً للرؤية الفورية */
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        /* نصوص وشعار الجزيرة الذكية */
        .brand-logo-container h1 {
            font-size: 17px; font-weight: 800; margin: 0; color: #ffffff !important;
        }

        .brand-logo-container span {
            color: var(--silver-metallic) !important;
            font-size: 10px; font-weight: 600; opacity: 0.7;
        }

        /* 🛒 زر السلة القوي والواضح داخل الجزيرة الذكية بلون التميز */
        #main-basket-btn {
            display: inline-flex !important; align-items: center !important; gap: 8px !important;
            background: var(--primary-solid) !important; /* لون التميز الواضح جداً */
            border: 1px solid rgba(255, 255, 255, 0.15) !important; 
            color: white !important;
            padding: 6px 14px !important; height: 38px; border-radius: 30px !important;
            font-family: 'Cairo' !important; font-weight: 700 !important; cursor: pointer !important;
            box-shadow: 0 4px 12px rgba(11, 63, 59, 0.3) !important;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        #main-basket-btn:hover {
            background: white !important;
            color: var(--black-premium) !important;
            border-color: white !important;
        }

        #main-basket-count {
            background: white !important;
            color: var(--primary-solid) !important;
            min-width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 11px; font-weight: 900; transition: 0.3s;
        }

        #main-basket-btn:hover #main-basket-count {
            background: var(--primary-solid) !important;
            color: white !important;
        }

        .header-spacer {
            height: 85px; width: 100%; display: block;
        }

        /* السلايدر المتكامل الفخم */
        .slider-container {
            width: 100% !important; position: relative !important; display: block !important;
            overflow: hidden !important; border-radius: var(--radius-premium);
            box-shadow: var(--card-shadow); margin-top: 10px;
        }

        #main-dynamic-slide {
            width: 100% !important; height: 360px !important; object-fit: cover !important;
        }

        /* شريط الأقسام السريع الأفقي التيتانيوم الفخم */
        .futuristic-scrolly-deck {
            display: flex !important; gap: 12px !important; padding: 20px 0 !important;
            overflow-x: auto !important; scrollbar-width: none !important;
            -webkit-overflow-scrolling: touch !important;
        }

        .futuristic-scrolly-deck::-webkit-scrollbar { display: none !important; }

        .quantum-scifi-card {
            flex: 0 0 120px !important;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border-radius: var(--radius-premium); padding: 14px 8px; text-align: center;
            cursor: pointer; transition: var(--transition-smooth);
        }

        .quantum-scifi-card:hover {
            transform: translateY(-4px);
            background: #ffffff;
            border-color: var(--primary-solid);
        }

        .quantum-scifi-card h3 { font-size: 12px; font-weight: 700; color: var(--black-premium); }

        /* شبكة عرض المنتجات */
        .main-container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .title-decorated {
            text-align: center; font-size: 24px; font-weight: 800; margin: 35px 0 20px;
            color: var(--black-premium); position: relative;
        }

        .title-decorated::after {
            content: ''; display: block; width: 45px; height: 3.5px;
            background: var(--primary-solid); margin: 8px auto 0; border-radius: 10px;
        }

        .products-showcase {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 50px;
        }

        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; }

        .card-footer .price-tag {
            font-size: 17px; font-weight: 800; color: var(--black-premium);
        }
        
        .premium-product-card p {
            color: var(--text-gray) !important; /* لون الرمادي الأنيق للنصوص الصغير والمواصفات */
            font-size: 12px; line-height: 1.6;
        }

        /* السلة الجانبية التيتانيوم */
        .sidebar-cart {
            position: fixed; top: 0; left: -420px;
            width: 100%; max-width: 420px; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(25px); z-index: 2000;
            display: flex; flex-direction: column;
            transition: left 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .sidebar-cart.open { left: 0; }

        @media (max-width: 1024px) { .products-showcase { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .products-showcase { grid-template-columns: repeat(2, 1fr); gap: 12px; }
            #main-dynamic-slide { height: 220px !important; }
            .custom-premium-header { left: 3% !important; width: 94% !important; } /* توازن مثالي على شاشات الهواتف */
        }

        /* 🌊 تفعيل التمرير الانسيابي لمنتجات السلة فقط */
.cart-scroll-area {
    overflow-y: auto !important; /* تفعيل السكرول العمودي */
    overflow-x: hidden !important; /* منع أي اهتزاز أفقي */
    max-height: calc(100vh - 220px) !important; /* حجز المساحة ليبقى الهيدر والفوتر ثابتين */
    
    /* دعم التمرير الفيزيائي فائق النعومة للهواتف الذكية */
    -webkit-overflow-scrolling: touch !important; 
    scroll-behavior: smooth;
}

/* ✨ شريط تمرير (سكرول بار) نحيف وأنيق متناسق مع التيتانيوم */
.cart-scroll-area::-webkit-scrollbar {
    width: 5px !important; /* سمك نحيف جداً لعدم تشويه المنظر */
    display: block !important;
}

.cart-scroll-area::-webkit-scrollbar-track {
    background: rgba(12, 13, 14, 0.02) !important; /* خلفية المجرى شبه مخفية */
}

.cart-scroll-area::-webkit-scrollbar-thumb {
    background: #cbd5e1 !important; /* لون تيتانيوم فضي ناعم ومتناسق */
    border-radius: 10px !important;
}

.cart-scroll-area::-webkit-scrollbar-thumb:hover {
    background: #0b3f3b !important; /* يتحول للون التميز الفخم عند لمسه */
}
/* 💳 فوتر السلة المطور: مريح للعين، فخم وحيادي */
        .cart-footer-area {
            margin-top: auto; /* الالتصاق الدائم في القاع */
            padding: 24px 20px !important;
            background: rgba(255, 255, 255, 0.85) !important;
            backdrop-filter: blur(15px) !important;
            -webkit-backdrop-filter: blur(15px) !important;
            border-top: 1px solid rgba(12, 13, 14, 0.05) !important;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* شريط المجموع: هادئ وواضح */
        .cart-total-price-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
            color: var(--black-premium);
            font-weight: 800;
            font-size: 16px;
        }

        /* 🔔 إعادة تصميم زر إنهاء الطلب: تيتانيوم ناعم شبه لامع بديل للداكن */
        .checkout-btn {
            background: linear-gradient(135deg, #ffffff, #e2e8f0) !important; /* تيتانيوم فضي ناعم ومريح */
            color: var(--black-premium) !important;
            border: 1px solid rgba(12, 13, 14, 0.1) !important;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03), inset 0 1px 2px #ffffff !important;
            border-radius: 40px !important; /* انحناء كبسولة ناعم جداً */
            padding: 14px 20px !important;
            font-size: 15px;
            font-weight: 800;
            width: 100% !important;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
        }

        /* التفاعل الذكي: يظهر لون التميز الخاص بك بنعومة فقط عند الحركة */
        .checkout-btn:hover {
            background: var(--primary-solid) !important; /* يتحول للون البترولي الفخم بسلاسة */
            color: white !important;
            border-color: var(--primary-solid) !important;
            box-shadow: 0 8px 25px rgba(11, 63, 59, 0.25) !important;
            transform: translateY(-2px);
        }

        /* 🔄 زر متابعة التسوق: نحيف جداً، ذكي، ولا يزاحم العين */
        .continue-shopping-btn {
            background: transparent !important;
            color: var(--text-gray) !important;
            border: none !important;
            box-shadow: none !important;
            font-size: 13px;
            font-weight: 700;
            padding: 5px !important;
            width: auto !important;
            margin: 0 auto !important;
            text-decoration: none;
            transition: all 0.3s ease !important;
            opacity: 0.8;
        }

        .continue-shopping-btn:hover {
            color: var(--primary-solid) !important; /* يضيء بلون التميز عند الاقتراب منه */
            opacity: 1;
            background: transparent !important;
            transform: scale(1.02);
        }

        /* استجابة الضغط السريع للموبايل للزر الجديد */
        .checkout-btn:active {
            transform: scale(0.96) !important;
            opacity: 0.9;
        }
    </style>

    </style>
</head>
<body>

    <div class="custom-premium-header">
        <button class="menu-trigger-btn" onclick="toggleCartMenu(true)">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
        </button>
        
        
        <div class="brand-logo-container">
            <h1>☕ كافيه حكاية</h1>
            <span>للقـهوة المـختصة والحلويات</span>
        </div>

        <button id="main-basket-btn" onclick="toggleCartMenu(true)">
            <span>المزاج المختص</span>
            <div id="main-basket-count">0</div>
        </button>
    </div>

    <div class="header-spacer"></div>

    <div class="slider-container">
        <img id="main-dynamic-slide" src="https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=1287&auto=format&fit=crop" alt="اجواء كافيه حكاية">
    </div>

    <div class="futuristic-scrolly-deck">
        <div class="quantum-scifi-card" onclick="filterBySection('ساخن')">
            <span class="icon">☕</span>
            <h3>قهوة ساخنة</h3>
        </div>
        <div class="quantum-scifi-card" onclick="filterBySection('بارد')">
            <span class="icon">🧊</span>
            <h3>مشروبات باردة</h3>
        </div>
        <div class="quantum-scifi-card" onclick="filterBySection('مخبوزات')">
            <span class="icon">🥐</span>
            <h3>مخبوزات طازجة</h3>
        </div>
        <div class="quantum-scifi-card" onclick="filterBySection('حلويات')">
            <span class="icon">🍰</span>
            <h3>الحلويات الفاخرة</h3>
        </div>
        <div class="quantum-scifi-card" onclick="filterBySection('حبوب')">
            <span class="icon">📦</span>
            <h3>حبوب البن والمستلزمات</h3>
        </div>
        <div class="quantum-scifi-card" onclick="filterBySection('خلطات')">
            <span class="icon">🥤</span>
            <h3>مكسات وعصائر</h3>
        </div>
    </div>

    <div class="main-container">
        <h2 class="title-decorated" id="showcase-title">منيو حكاية للقهوة والمزاج</h2>
        <div class="products-showcase" id="products-grid-container">
            </div>
    </div>

    <div class="cart-overlay" id="cart-screen-overlay" onclick="toggleCartMenu(false)"></div>
    <div class="sidebar-cart" id="sidebar-cart-menu">
        <div class="cart-top-bar">
            <h3 style="font-weight: 900; color: var(--primary-dark);">🛒 قائمة طلباتك الحالية</h3>
            <button onclick="toggleCartMenu(false)" style="background: none; border: none; font-size: 20px; cursor: pointer; color: var(--accent-gold);">✕</button>
        </div>
        
        <div class="cart-scroll-area" id="cart-items-list-container">
            </div>

        <div class="summary-total">
            <span>الإجمالي الإجمالي:</span>
            <span style="font-weight: 900; color: var(--accent-gold);"><span id="cart-total-amount">0.00</span> ₪</span>
        </div>

        <div class="cart-actions-footer">
            <button class="checkout-btn" onclick="sendCartToWhatsApp()">🚀 إتمام تأكيد وجدولة الطلب</button>
            <button class="continue-shopping-btn" onclick="toggleCartMenu(false)">☕ إضافة المزيد للمزاج</button>
        </div>
    </div>

    <script>
        // قاعدة بيانات منيو كافيه حكاية المحدثة
        const storeProductsDatabase = [
            { id: 1, name: "إسبريسو سينجل (بن مختص غواتيمالا)", price: 10.00, category: "ساخن", img: "https://images.unsplash.com/photo-1510707577719-aa7c148c7e84?w=500&auto=format&fit=crop&q=60" },
            { id: 2, name: "سبانش لاتيه بارد ومسترسل دبل شوت", price: 18.00, category: "بارد", img: "https://images.unsplash.com/photo-1517701604599-bb29b565090c?w=500&auto=format&fit=crop&q=60" },
            { id: 3, name: "فلات وايت متناسق النكهات برغوة ناعمة", price: 14.00, category: "ساخن", img: "https://images.unsplash.com/photo-1577968897966-3d4325b36b61?w=500&auto=format&fit=crop&q=60" },
            { id: 4, name: "آيس كراميل ماكياتو طبقات فاخرة", price: 18.00, category: "بارد", img: "https://images.unsplash.com/photo-1485808191679-5f86510681a2?w=500&auto=format&fit=crop&q=60" },
            { id: 5, name: "كرواسون فرنسي طازج محشي بالزبدة النقية", price: 12.00, category: "مخبوزات", img: "https://images.unsplash.com/photo-1555507036-ab1f4038808a?w=500&auto=format&fit=crop&q=60" },
            { id: 6, name: "كيكة الزعفران اللذيذة مع حليب السكب الفاخر", price: 22.00, category: "حلويات", img: "https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=500&auto=format&fit=crop&q=60" },
            { id: 7, name: "كيس بن حبوب كولومبيا محمص ومختص 250g", price: 45.00, category: "حبوب", img: "https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=500&auto=format&fit=crop&q=60" },
            { id: 8, name: "مكس عصير الرمان والباشن فروت البارد الفريش", price: 16.00, category: "خلطات", img: "https://images.unsplash.com/photo-1513558161293-cdaf765ed2fd?w=500&auto=format&fit=crop&q=60" }
        ];

        let userCartList = [];

        // طباعة وعرض المنتجات بالشبكة
        function displayStoreItems(itemsToRender) {
            const gridContainer = document.getElementById('products-grid-container');
            if(!gridContainer) return;
            gridContainer.innerHTML = '';

            itemsToRender.forEach(product => {
                const cardHTML = `
                    <div class="premium-product-card">
                        <img src="${product.img}" alt="${product.name}">
                        <h4>${product.name}</h4>
                        <div class="card-footer">
                            <span class="price-tag">${product.price.toFixed(2)} ₪</span>
                            <button class="circle-add-btn" onclick="addNewProductToCart(${product.id})">+</button>
                        </div>
                    </div>
                `;
                gridContainer.insertAdjacentHTML('beforeend', cardHTML);
            });
        }

        // فلترة وعرض المنتجات حسب القسم المختار
        function filterBySection(categoryName) {
            const filtered = storeProductsDatabase.filter(p => p.category === categoryName);
            displayStoreItems(filtered);
            document.getElementById('showcase-title').innerText = `قسم الـ ${categoryName} الفاخر`;
        }

        // إضافة منتج جديد للسلة مع تفعيل العداد الصغير
        function addNewProductToCart(productId) {
            const product = storeProductsDatabase.find(p => p.id === productId);
            if(!product) return;

            const existingItem = userCartList.find(item => item.id === productId);
            if(existingItem) {
                existingItem.qty += 1;
            } else {
                userCartList.push({ ...product, qty: 1 });
            }
            refreshCartInterface();
        }

        // تحديث واجهات حساب الأسعار والسلة بالكامل بذكاء ودقة
        function refreshCartInterface() {
            const cartItemsContainer = document.getElementById('cart-items-list-container');
            const cartTotalElement = document.getElementById('cart-total-amount');
            const mainBasketCount = document.getElementById('main-basket-count');

            const totalItemsCount = userCartList.reduce((sum, item) => sum + item.qty, 0);
            if (mainBasketCount) {
                mainBasketCount.innerText = totalItemsCount;
            }

            saveCartToLocalStorage();

            if (!cartItemsContainer) return;
            cartItemsContainer.innerHTML = '';

            let totalPriceSum = 0;

            if (!userCartList || userCartList.length === 0) {
                cartItemsContainer.innerHTML = `
                    <div style="text-align: center; padding: 40px 20px; color: #a1a1aa;">
                        <span style="font-size: 40px; display: block; margin-bottom: 10px;">☕</span>
                        <p style="margin: 0; font-size: 14px; font-weight: 700; color:#2c1a11;">سلتك فارغة، بانتظار بدء حكايتك ومزاجك الطيب!</p>
                    </div>
                `;
                if (cartTotalElement) cartTotalElement.innerText = "0.00";
                return;
            }

            userCartList.forEach(item => {
                const itemTotal = item.price * item.qty;
                totalPriceSum += itemTotal;

                const itemHTML = `
                    <div style="display: flex; align-items: center; justify-content: space-between; padding: 12px 8px; border-bottom: 1px solid #f5f5f4; direction: rtl;">
                        <div style="flex: 1; text-align: right; padding-left: 10px;">
                            <h5 style="margin: 0; font-size: 13px; font-weight: 700; color: #2c1a11;">${item.name}</h5>
                            <span style="font-size: 12px; color: #d97706; font-weight: 700;">${item.price.toFixed(2)} ₪</span>
                        </div>
                        <div style="display: flex; align-items: center; gap: 8px; background: #f5f5f4; padding: 4px 10px; border-radius: 30px;">
                            <button onclick="changeCartQty(${item.id}, -1)" style="border: none; background: none; font-size: 16px; font-weight: bold; cursor: pointer; color: #78716c;">-</button>
                            <span style="font-size: 13px; font-weight: 900; color: #1c1917;">${item.qty}</span>
                            <button onclick="changeCartQty(${item.id}, 1)" style="border: none; background: none; font-size: 14px; font-weight: bold; cursor: pointer; color: #78716c;">+</button>
                        </div>
                        <div style="min-width: 70px; text-align: left; font-size: 13px; font-weight: 900; color: #2c1a11;">
                            ${itemTotal.toFixed(2)} ₪
                        </div>
                    </div>
                `;
                cartItemsContainer.insertAdjacentHTML('beforeend', itemHTML);
            });

            if (cartTotalElement) {
                cartTotalElement.innerText = totalPriceSum.toFixed(2);
            }
        }

        function changeCartQty(id, change) {
            const match = userCartList.find(item => item.id === id);
            if (match) {
                match.qty += change;
                if (match.qty <= 0) {
                    userCartList = userCartList.filter(item => item.id !== id);
                }
                refreshCartInterface();
            }
        }

        function saveCartToLocalStorage() {
            localStorage.setItem('hikaya_cafe_cart', JSON.stringify(userCartList));
        }

        function loadCartFromLocalStorage() {
            const savedCart = localStorage.getItem('hikaya_cafe_cart');
            if (savedCart) {
                userCartList = JSON.parse(savedCart);
                refreshCartInterface();
            }
        }

        function toggleCartMenu(openStatus) {
            const cartMenu = document.getElementById('sidebar-cart-menu');
            const overlay = document.getElementById('cart-screen-overlay');
            if(openStatus) {
                cartMenu.classList.add('open');
                overlay.classList.add('active');
            } else {
                cartMenu.classList.remove('open');
                overlay.classList.remove('active');
            }
        }

        // نظام إرسال واستلام الطلبات المروري الفوري المربوط بـ Waze والواتساب المباشر
        function sendCartToWhatsApp() {
            if (!userCartList || userCartList.length === 0) {
                alert("سلتك فارغة، يرجى اختيار مشروبك أو حلاك المفضل أولاً! ☕");
                return;
            }

            const oldModal = document.getElementById('hikaya-sky-modal');
            if (oldModal) oldModal.remove();

            let customerLat = "";
            let customerLon = "";
            let customerWazeURL = "";

            const modalHTML = `
                <div id="hikaya-sky-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(44, 26, 17, 0.4); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; z-index: 99999; direction: rtl; font-family: 'Cairo', sans-serif;">
                    <div style="background: #fdfbf7; border: 2px solid rgba(217, 119, 6, 0.3); width: 95%; max-width: 430px; padding: 35px 25px; border-radius: 28px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.15);">
                        <h3 style="margin: 0 0 10px 0; font-size: 20px; font-weight: 900; color: #2c1a11;">✨ تفاصيل طلبك من كافيه حكاية ✨</h3>
                        <div style="width: 60px; height: 4px; background: #d97706; margin: 0 auto 25px auto; border-radius: 2px;"></div>
                        
                        <div style="margin-bottom: 22px; text-align: right;">
                            <label style="display: block; font-size: 14px; font-weight: 700; color: #2c1a11; margin-bottom: 8px;">👤 اسم العميل الكريم:</label>
                            <input type="text" id="modal-cust-name" placeholder="✍️ اكتب اسمك هنا لمتابعة وتجهيز فنجانك..." style="width: 100%; padding: 14px 18px; border: 2px solid rgba(217, 119, 6, 0.2); border-radius: 16px; font-size: 14px; outline: none; box-sizing: border-box;">
                        </div>
                        
                        <div style="margin-bottom: 32px; text-align: right;">
                            <label style="display: block; font-size: 14px; font-weight: 700; color: #2c1a11; margin-bottom: 8px;">🚙 موقع التوصيل أو الاستلام (Waze):</label>
                            <button id="geo-location-btn" style="width: 100%; padding: 15px; border: 2px dashed #d97706; border-radius: 16px; background: rgba(217, 119, 6, 0.05); color: #d97706; font-size: 14px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;">
                                <span>📍 مشاركة الموقع لربطه بخرائط خط السير فوراً</span>
                            </button>
                            <div id="geo-status" style="font-size: 12px; font-weight: 700; color: #d97706; margin-top: 8px; text-align: center; display: none;"></div>
                        </div>
                        
                        <div style="display: flex; gap: 12px;">
                            <button id="modal-submit-btn" style="flex: 1.4; background: linear-gradient(135deg, #d97706, #1e110b); color: white; border: none; padding: 16px; border-radius: 50px; font-size: 15px; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(217,119,6,0.25);">🚀 إرسال الطلب وجدولته عبر الواتساب</button>
                            <button id="modal-close-btn" style="flex: 0.6; background: #e7e5e4; color: #2c1a11; border: none; padding: 16px; border-radius: 50px; font-size: 14px; font-weight: 700; cursor: pointer;">إلغاء</button>
                        </div>
                    </div>
                </div>
            </div>`;

            document.body.insertAdjacentHTML('beforeend', modalHTML);

            const modalElement = document.getElementById('hikaya-sky-modal');
            const submitBtn = document.getElementById('modal-submit-btn');
            const closeBtn = document.getElementById('modal-close-btn');
            const locationBtn = document.getElementById('geo-location-btn');
            const locationStatus = document.getElementById('geo-status');

            closeBtn.addEventListener('click', () => modalElement.remove());

            locationBtn.addEventListener('click', () => {
                if (!navigator.geolocation) {
                    locationStatus.style.display = "block";
                    locationStatus.innerHTML = "❌ المتصفح لا يدعم تحديد الموقع التلقائي.";
                    return;
                }

                locationStatus.style.display = "block";
                locationStatus.innerHTML = "⏳ جاري تحديد موقعك بالـ GPS لتجهيز خريطة Waze...";

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        customerLat = position.coords.latitude;
                        customerLon = position.coords.longitude;
                        customerWazeURL = `https://www.waze.com/ul?ll=${customerLat},${customerLon}&navigate=yes`;
                        
                        locationBtn.style.background = "rgba(34, 197, 94, 0.1)";
                        locationBtn.style.borderColor = "#22c55e";
                        locationBtn.style.color = "#16a34a";
                        locationBtn.innerHTML = "✅ تم ربط موقعك بتطبيق Waze بنجاح!";
                        locationStatus.innerHTML = "🚙 باريستا كافيه حكاية جاهز لاستلام موقعك.";
                    },
                    (error) => {
                        locationStatus.innerHTML = "⚠️ يرجى تفعيل الـ GPS والسماح بالوصول للموقع لتأكيد خط السير.";
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });

            submitBtn.addEventListener('click', () => {
                const nameInput = document.getElementById('modal-cust-name');
                const customerName = nameInput.value.trim();

                if (customerName === "") {
                    nameInput.style.borderColor = "#ef4444";
                    nameInput.focus();
                    return;
                }

                if (customerWazeURL === "") {
                    locationBtn.style.borderColor = "#ef4444";
                    locationStatus.style.display = "block";
                    locationStatus.innerHTML = "⚠️ خطوة إجبارية: يرجى الضغط على زر الموقع أولاً لتحديد مسار السيارة!";
                    return;
                }

                // رقم الواتساب المباشر المخصص للمقهى لاستلام الطلبات تلقائياً
                const storeWhatsAppNumber = "972524310286"; 
                let messageText = `*طلب جديد من كافيه حكاية للقهوة المختصة ☕✨*\n\n`;
                messageText += `👤 *اسم العميل:* ${customerName}\n`;
                messageText += `📍 *رابط الخريطة المباشر (Waze):* ${customerWazeURL}\n`;
                messageText += `-----------------------------------\n\n`;
                messageText += `🛒 *تفاصيل المزاج المطلوبة:*\n`;

                let finalTotal = 0;
                userCartList.forEach((item, index) => {
                    const itemTotal = item.price * item.qty;
                    finalTotal += itemTotal;
                    messageText += `${index + 1}) *${item.name}*\n    الكمية: [ ${item.qty} ] ✖️ السعر: ${item.price.toFixed(2)} ₪ ⬅️ *${itemTotal.toFixed(2)} ₪*\n`;
                });

                messageText += `\n-----------------------------------\n`;
                messageText += `💰 *الإجمالي النهائي للفاتورة:* [ *${finalTotal.toFixed(2)} ₪* ]\n\n`;
                messageText += `☕ _يرجى البدء بطحن البن الفريش وتجهيز الطلب لتقديمه طازجاً._`;

                const encodedMessage = encodeURIComponent(messageText);
                const whatsappURL = `https://api.whatsapp.com/send?phone=${storeWhatsAppNumber}&text=${encodedMessage}`;
                
                userCartList = [];
                saveCartToLocalStorage();
                refreshCartInterface();
                toggleCartMenu(false);
                modalElement.remove();

                window.location.href = whatsappURL;
            });
        }

        // تشغيل التهيئة وعرض المنتجات عند فتح الصفحة مباشرة
        document.addEventListener("DOMContentLoaded", function () {
            displayStoreItems(storeProductsDatabase);
            loadCartFromLocalStorage();

            // سلايدر خلفيات حية ومتحركة تلقائياً
            const images = [
                "https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=1287&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=1470&auto=format&fit=crop", 
                "https://images.unsplash.com/photo-1514432324607-a09d9b4aefdd?q=80&w=1287&auto=format&fit=crop"
            ];
            let currentImgIndex = 0;
            const imgElement = document.getElementById('main-dynamic-slide');

            if (imgElement) {
                setInterval(() => {
                    imgElement.style.opacity = 0;
                    setTimeout(() => {
                        currentImgIndex = (currentImgIndex + 1) % images.length;
                        imgElement.src = images[currentImgIndex];
                        imgElement.style.opacity = 1;
                    }, 1200);
                }, 5000);
            }
        });
    </script>
</body>
</html>
